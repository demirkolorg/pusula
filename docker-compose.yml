services:
  postgres:
    image: postgres:16-alpine
    container_name: pusula-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: pusula
      POSTGRES_PASSWORD: pusula_dev_password
      POSTGRES_DB: pusula
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    volumes:
      - pusula_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pusula -d pusula"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pusula-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: pusula_minio
      MINIO_ROOT_PASSWORD: pusula_minio_dev_password
    command: server /data --console-address ":9001"
    volumes:
      - pusula_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: pusula-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pusula_pg_data:
  pusula_minio_data:
